<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI Simulator Pro - EdTech Version</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #050505;
            --bg-panel: #042157;
            --accent: #00a2a7;
            --terminal: #021130;
            --text-green: #00ffcc;
        }

        body {
            background-color: var(--bg-main);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra todo el contenido */
            min-height: 100vh;
            user-select: none;
        }

        .instruction-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.05);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 11px;
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
        }
        .instruction-bar i { color: var(--accent); }

        .container {
            display: flex;
            flex-wrap: wrap; /* Importante para pantallas pequeñas */
            justify-content: center;
            gap: 20px;
            background: var(--bg-panel);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            margin: 0 auto; /* CENTRADO ABSOLUTO EN EL IFRAME */
            max-width: 950px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Lógica de Teclado */
        .keyboard {
            display: flex;
            height: 250px;
            background: #000;
            padding: 12px;
            border-radius: 8px;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .key {
            cursor: pointer;
            position: relative;
            transition: all 0.1s ease;
        }

        .key.white {
            width: 50px;
            height: 100%;
            background: #fff;
            border: 1px solid #bbb;
            z-index: 1;
            border-radius: 0 0 4px 4px;
        }

        .key.black {
            width: 32px;
            height: 150px;
            background: #1a1a1a;
            margin-left: -16px;
            margin-right: -16px;
            z-index: 2;
            border-radius: 0 0 4px 4px;
        }

        .key.active {
            background: var(--accent) !important;
            transform: translateY(4px);
            box-shadow: 0 5px 15px rgba(0, 162, 167, 0.4);
        }

        /* Controles de Pitch */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            width: 50px;
        }

        .pitch-slider {
            appearance: none;
            width: 140px;
            height: 6px;
            background: #000;
            transform: rotate(-90deg);
            margin: 70px 0;
            border-radius: 5px;
            cursor: ns-resize;
        }

        .pitch-slider::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid white;
        }

        /* Consola de Datos */
        .console {
            width: 380px;
            height: 274px;
            background: var(--terminal);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            border: 1px solid rgba(0, 162, 167, 0.3);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #log {
            flex-grow: 1;
            overflow-y: auto;
            color: var(--text-green);
            line-height: 1.4;
        }

        .log-entry {
            border-bottom: 1px solid rgba(0, 162, 167, 0.1);
            padding: 2px 0;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

<div class="instruction-bar">
    <span><i data-lucide="music"></i> PLAY KEYS</span>
    <span><i data-lucide="zap"></i> ADJUST PITCH BEND</span>
    <span><i data-lucide="code-2"></i> MONITOR MIDI DATA</span>
</div>

<div class="container">
    <div class="controls">
        <span style="font-size: 8px; font-weight: bold; color: var(--accent);">PITCH</span>
        <input type="range" id="pitch" class="pitch-slider" min="-500" max="500" value="0">
    </div>

    <div class="keyboard" id="piano"></div>

    <div class="console">
        <div style="font-size: 9px; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid var(--accent); display:flex; justify-content: space-between;">
            <span>DATA LOG</span>
            <span id="activity-light">○ READY</span>
        </div>
        <div id="log"></div>
    </div>
</div>

<script>
    // AUDIO ENGINE
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const voices = {};
    let globalDetune = 0;

    function play(freq, id) {
        if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'square'; // Sonido más rico tipo sintetizador
        osc.frequency.value = freq;
        osc.detune.value = globalDetune;
        g.gain.setValueAtTime(0.08, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.5);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start();
        voices[id] = {osc, g};
    }

    function stop(id) {
        if (voices[id]) {
            voices[id].g.gain.setTargetAtTime(0, ctx.currentTime, 0.03);
            voices[id].osc.stop(ctx.currentTime + 0.1);
            delete voices[id];
        }
    }

    // INTERFACE & LOGIC
    const logEl = document.getElementById('log');
    const actLight = document.getElementById('activity-light');
    const piano = document.getElementById('piano');

    const notes = [
        {n:'C4', f:261.6, v:60, t:'white'}, {n:'C#4', f:277.2, v:61, t:'black'},
        {n:'D4', f:293.7, v:62, t:'white'}, {n:'D#4', f:311.1, v:63, t:'black'},
        {n:'E4', f:329.6, v:64, t:'white'}, {n:'F4', f:349.2, v:65, t:'white'},
        {n:'F#4', f:370.0, v:66, t:'black'}, {n:'G4', f:392.0, v:67, t:'white'},
        {n:'G#4', f:415.3, v:68, t:'black'}, {n:'A4', f:440.0, v:69, t:'white'},
        {n:'A#4', f:466.2, v:70, t:'black'}, {n:'B4', f:493.9, v:71, t:'white'}
    ];

    function writeLog(m) {
        const d = document.createElement('div');
        d.className = 'log-entry';
        d.innerHTML = `> ${m}`;
        logEl.appendChild(d);
        logEl.scrollTop = logEl.scrollHeight;
        if(logEl.childElementCount > 12) logEl.removeChild(logEl.firstChild);
    }

    notes.forEach(note => {
        const k = document.createElement('div');
        k.className = `key ${note.t}`;
        
        const triggerOn = (e) => {
            e.preventDefault();
            if(k.classList.contains('active')) return;
            k.classList.add('active');
            actLight.innerText = '● ON';
            actLight.style.color = '#00ffcc';
            play(note.f, note.v);
            writeLog(`Note ON | ${note.n} | Val: ${note.v} | Vel: 100`);
        };

        const triggerOff = () => {
            if(k.classList.contains('active')) {
                k.classList.remove('active');
                actLight.innerText = '○ READY';
                actLight.style.color = '#fff';
                stop(note.v);
                writeLog(`Note OFF | ${note.n} | Val: ${note.v} | Vel: 0`);
            }
        };

        k.addEventListener('mousedown', triggerOn);
        window.addEventListener('mouseup', triggerOff);
        k.addEventListener('touchstart', triggerOn);
        k.addEventListener('touchend', triggerOff);
        piano.appendChild(k);
    });

    document.getElementById('pitch').addEventListener('input', (e) => {
        globalDetune = parseInt(e.target.value);
        for(let id in voices) voices[id].osc.detune.setValueAtTime(globalDetune, ctx.currentTime);
        writeLog(`Pitch Bend: ${globalDetune}`);
    });

    lucide.createIcons();
</script>
</body>
</html>
