<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI Protocol Simulator</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #042157;
            --key-white: #ffffff;
            --key-black: #1a1a1a;
            --accent: #00a2a7;
            --terminal-bg: #020d24;
            --text-terminal: #00ffcc;
            --hint-text: rgba(255,255,255,0.6);
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Instructions Bar */
        .instruction-bar {
            display: flex;
            gap: 25px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--hint-text);
        }

        .step i { color: var(--accent); }

        .container {
            display: flex;
            gap: 20px;
            background: var(--bg-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Keyboard Styles */
        .keyboard {
            display: flex;
            position: relative;
            height: 250px;
            padding: 10px;
            background: #111;
            border-radius: 4px;
        }

        .key {
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
        }

        .key.white {
            width: 55px;
            height: 100%;
            background: var(--key-white);
            border: 1px solid #ccc;
            z-index: 1;
        }

        .key.black {
            width: 38px;
            height: 150px;
            background: var(--key-black);
            margin-left: -19px;
            margin-right: -19px;
            z-index: 2;
            border-radius: 0 0 4px 4px;
        }

        .key.active {
            background: var(--accent) !important;
            transform: translateY(4px);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Console */
        .console {
            width: 380px;
            height: 270px;
            background: var(--terminal-bg);
            border-radius: 6px;
            padding: 15px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 162, 167, 0.3);
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            font-size: 10px;
            border-bottom: 1px solid rgba(0, 162, 167, 0.2);
            padding-bottom: 5px;
        }

        #log {
            flex-grow: 1;
            overflow-y: auto;
            color: var(--text-terminal);
        }

        .log-entry {
            margin-bottom: 4px;
            animation: slideIn 0.15s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="instruction-bar">
    <div class="step"><i data-lucide="mouse-pointer-2" size="16"></i> <span>Click keys to trigger MIDI events</span></div>
    <div class="step"><i data-lucide="binary" size="16"></i> <span>Observe Hex/Decimal data flow</span></div>
    <div class="step"><i data-lucide="activity" size="16"></i> <span>Note On (Vel > 0) / Note Off (Vel = 0)</span></div>
</div>

<div class="container">
    <div class="keyboard" id="piano"></div>

    <div class="console">
        <div class="terminal-header">
            <span>LIVE MIDI DATA STREAM</span>
            <i data-lucide="wifi" size="14"></i>
        </div>
        <div id="log">
            <div class="log-entry">> Connection established. Awaiting input...</div>
        </div>
    </div>
</div>

<script>
    class MIDISimulator {
        constructor() {
            this.logElement = document.getElementById('log');
            this.pianoElement = document.getElementById('piano');
            this.notes = [
                { n: 'C4', v: 60, t: 'white' },
                { n: 'C#4', v: 61, t: 'black' },
                { n: 'D4', v: 62, t: 'white' },
                { n: 'D#4', v: 63, t: 'black' },
                { n: 'E4', v: 64, t: 'white' },
                { n: 'F4', v: 65, t: 'white' },
                { n: 'F#4', v: 66, t: 'black' },
                { n: 'G4', v: 67, t: 'white' },
                { n: 'G#4', v: 68, t: 'black' },
                { n: 'A4', v: 69, t: 'white' },
                { n: 'A#4', v: 70, t: 'black' },
                { n: 'B4', v: 71, t: 'white' },
                { n: 'C5', v: 72, t: 'white' }
            ];
            this.init();
        }

        init() {
            this.notes.forEach(note => {
                const div = document.createElement('div');
                div.className = `key ${note.t}`;
                div.dataset.val = note.v;
                
                div.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    this.triggerNote(note, true);
                });
                
                div.addEventListener('mouseup', () => this.triggerNote(note, false));
                div.addEventListener('mouseleave', () => {
                    if(div.classList.contains('active')) this.triggerNote(note, false);
                });

                this.pianoElement.appendChild(div);
            });
            lucide.createIcons();
        }

        triggerNote(note, isOn) {
            const status = isOn ? 'Note On ' : 'Note Off';
            const velocity = isOn ? 100 : 0;
            const keyEl = document.querySelector(`[data-val="${note.val}"]`);

            if(isOn) {
                keyEl.classList.add('active');
            } else {
                keyEl.classList.remove('active');
            }

            this.logData(status, note.n, note.val, velocity);
        }

        logData(status, name, noteVal, velocity) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const timestamp = new Date().toLocaleTimeString('en-GB', { hour12: false }).split(' ')[0];
            
            entry.innerHTML = `<span style="color:#444">[${timestamp}]</span> > <span style="color:${velocity > 0 ? '#00ffcc' : '#ff4444'}">${status}</span> | Ch: 1 | Note: ${name} (${noteVal}) | Vel: ${velocity}`;
            
            this.logElement.appendChild(entry);
            this.logElement.scrollTop = this.logElement.scrollHeight;

            if(this.logElement.childElementCount > 14) {
                this.logElement.removeChild(this.logElement.firstChild);
            }
        }
    }

    new MIDISimulator();
</script>

</body>
</html>
