<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI Protocol Simulator</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #042157;
            --key-white: #ffffff;
            --key-black: #1a1a1a;
            --accent: #00a2a7;
            --terminal-bg: #020d24;
            --text-terminal: #00ffcc;
        }

        body {
            background-color: #050505;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none; /* Evita que se seleccione texto al hacer clic rápido */
        }

        .instruction-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .container {
            display: flex;
            gap: 20px;
            background: var(--bg-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .keyboard {
            display: flex;
            height: 250px;
            background: #111;
            padding: 10px;
            border-radius: 4px;
            position: relative;
        }

        .key {
            cursor: pointer;
            position: relative;
            transition: transform 0.05s;
            pointer-events: auto; /* Asegura que capturen el clic */
        }

        .key.white {
            width: 50px;
            height: 100%;
            background: var(--key-white);
            border: 1px solid #999;
            z-index: 1;
        }

        .key.black {
            width: 34px;
            height: 150px;
            background: var(--key-black);
            margin-left: -17px;
            margin-right: -17px;
            z-index: 2;
            border-radius: 0 0 3px 3px;
        }

        /* Estado activo forzado */
        .key.active {
            background: var(--accent) !important;
            transform: translateY(2px);
        }

        .console {
            width: 350px;
            height: 270px;
            background: var(--terminal-bg);
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            font-size: 11px;
            border: 1px solid rgba(0, 162, 167, 0.3);
            display: flex;
            flex-direction: column;
        }

        #log {
            flex-grow: 1;
            overflow-y: auto;
            color: var(--text-terminal);
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 5px; }
    </style>
</head>
<body>

<div class="instruction-bar">
    <span>TEST: Click the piano keys to see MIDI Data</span>
</div>

<div class="container">
    <div class="keyboard" id="piano"></div>
    <div class="console">
        <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">> MIDI MONITOR ACTIVE</div>
        <div id="log"></div>
    </div>
</div>

<script>
    const logElement = document.getElementById('log');
    const piano = document.getElementById('piano');

    const notes = [
        { n: 'C4', v: 60, t: 'white' }, { n: 'C#4', v: 61, t: 'black' },
        { n: 'D4', v: 62, t: 'white' }, { n: 'D#4', v: 63, t: 'black' },
        { n: 'E4', v: 64, t: 'white' }, { n: 'F4', v: 65, t: 'white' },
        { n: 'F#4', v: 66, t: 'black' }, { n: 'G4', v: 67, t: 'white' },
        { n: 'G#4', v: 68, t: 'black' }, { n: 'A4', v: 69, t: 'white' },
        { n: 'A#4', v: 70, t: 'black' }, { n: 'B4', v: 71, t: 'white' }
    ];

    function addLog(status, name, val, vel) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `> ${status} | Note: ${name} (${val}) | Vel: ${vel}`;
        logElement.appendChild(entry);
        logElement.scrollTop = logElement.scrollHeight;
    }

    notes.forEach(note => {
        const key = document.createElement('div');
        key.className = `key ${note.t}`;
        
        // Usamos eventos de Mouse y Touch para máxima compatibilidad
        const startAction = (e) => {
            e.preventDefault();
            key.classList.add('active');
            addLog('Note On', note.n, note.v, 100);
        };

        const stopAction = () => {
            if(key.classList.contains('active')) {
                key.classList.remove('active');
                addLog('Note Off', note.n, note.v, 0);
            }
        };

        key.addEventListener('mousedown', startAction);
        window.addEventListener('mouseup', stopAction); // Window para capturar el release fuera de la tecla
        
        // Compatibilidad móvil
        key.addEventListener('touchstart', startAction);
        key.addEventListener('touchend', stopAction);

        piano.appendChild(key);
    });

    // Inicializar iconos si la librería cargó
    if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>
